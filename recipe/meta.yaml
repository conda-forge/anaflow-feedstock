{% set name = "anaflow" %}
{% set version = "1.2.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 150e1901c4ccbba14066b7ec607bba393a9cab43ae878747937417f4d50649f7

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python {{ python_min }}
    - setuptools >=64
    - setuptools_scm >=7
  run:
    - python >={{ python_min }}
    - numpy >=1.14.5
    - pentapy >=1.1.0
    - scipy >=1.1.0

test:
  imports:
    - anaflow
  requires:
    - pytest
    - python {{ python_min }}
  source_files:
    - tests
  commands:
    - pytest -vv tests

about:
  home: https://github.com/GeoStat-Framework/AnaFlow
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: AnaFlow - analytical solutions for the groundwater-flow equation.
  doc_url: https://anaflow.readthedocs.io/
  dev_url: https://github.com/GeoStat-Framework/AnaFlow

extra:
  recipe-maintainers:
    - MuellerSeb
